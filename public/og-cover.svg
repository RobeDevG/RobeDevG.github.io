<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio de Roberto Gonzalez</title>
  <desc id="desc">Front-End Developer especializado en React, UI/UX y performance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="55%" stop-color="#0f1f2e" />
      <stop offset="100%" stop-color="#13303b" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#a3e635" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1030" cy="100" r="200" fill="#22d3ee" opacity="0.18" />
  <circle cx="180" cy="560" r="240" fill="#84cc16" opacity="0.16" />

  <rect x="72" y="72" width="1056" height="486" rx="28" fill="#0f172a" opacity="0.55" />
  <rect x="72" y="72" width="1056" height="486" rx="28" fill="none" stroke="url(#accent)" stroke-opacity="0.45" stroke-width="2" />

  <text x="130" y="210" fill="#9ae6b4" font-family="Segoe UI, Arial, sans-serif" font-size="24" letter-spacing="5">PORTFOLIO</text>
  <text x="130" y="300" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="700">Roberto Gonzalez</text>
  <text x="130" y="365" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="34">Front-End Developer</text>
  <text x="130" y="435" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="28">React . TypeScript . Tailwind . UI/UX</text>

  <rect x="130" y="470" width="360" height="56" rx="28" fill="#ffffff" opacity="0.1" />
  <text x="160" y="507" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="24">robedevg.github.io</text>
